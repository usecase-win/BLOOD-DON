<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donors — Blood Donation System</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>
  <div class="page-header">
    <h1>🩸 Donor Management</h1>
    <p>Register new donors and search for existing ones</p>
  </div>

  <div class="container">
    <div class="two-col">

      <!-- Register -->
      <div class="card">
        <h2>➕ Register Donor</h2>
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="name" placeholder="Enter full name"/>
        </div>
        <div class="form-group">
          <label>Age *</label>
          <input type="number" id="age" placeholder="18–65" min="18" max="65"/>
        </div>
        <div class="form-group">
          <label>Blood Group *</label>
          <select id="bloodGroup">
            <option value="">-- Select --</option>
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
          </select>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select id="gender">
            <option value="">-- Select --</option>
            <option>Male</option><option>Female</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>City *</label>
          <input type="text" id="city" placeholder="Your city"/>
        </div>
        <div class="form-group">
          <label>Contact *</label>
          <input type="text" id="contact" placeholder="10-digit number"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Optional"/>
        </div>
        <button class="btn btn-primary" onclick="addDonor()">Register Donor</button>
        <div class="msg" id="add-msg"></div>
      </div>

      <!-- Search -->
      <div class="card">
        <h2>🔍 Search Donors</h2>
        <div class="form-group">
          <label>Blood Group</label>
          <select id="s-bg">
            <option value="">-- Any --</option>
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
          </select>
        </div>
        <div class="form-group">
          <label>City</label>
          <input type="text" id="s-city" placeholder="Search by city"/>
        </div>
        <button class="btn btn-primary" onclick="searchDonors()">Search</button>
        <button class="btn btn-secondary btn-sm" style="margin-top:8px;width:100%" onclick="loadAll()">Show All Donors</button>
        <div id="search-results" style="margin-top:16px;"></div>
      </div>

    </div>
  </div>

  <footer>Blood Donation Management System</footer>
  <script src="nav.js"></script>
  <script>
    async function addDonor() {
      const body = {
        name:       document.getElementById('name').value.trim(),
        age:        document.getElementById('age').value,
        bloodGroup: document.getElementById('bloodGroup').value,
        gender:     document.getElementById('gender').value,
        city:       document.getElementById('city').value.trim(),
        contact:    document.getElementById('contact').value.trim(),
        email:      document.getElementById('email').value.trim()
      };
      if (!body.name||!body.age||!body.bloodGroup||!body.city||!body.contact)
        return showMsg('add-msg','Please fill all required fields.','error');
      const r = await fetch('/add-donor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const d = await r.json();
      showMsg('add-msg', d.message, d.success ? 'success' : 'error');
      if (d.success) ['name','age','city','contact','email'].forEach(id => document.getElementById(id).value='');
    }

    async function searchDonors() {
      const bg   = document.getElementById('s-bg').value;
      const city = document.getElementById('s-city').value;
      const r = await fetch(`/search-donor?bloodGroup=${encodeURIComponent(bg)}&city=${encodeURIComponent(city)}`);
      const d = await r.json();
      renderDonors(d.donors || []);
    }

    async function loadAll() {
      const r = await fetch('/all-donors');
      const d = await r.json();
      renderDonors(d.donors || []);
    }

    function renderDonors(donors) {
      const rows = donors.map((d,i) => `<tr>
        <td>${i+1}</td>
        <td>${d.name}</td>
        <td>${d.age}</td>
        <td><span class="bg-badge">${d.bloodGroup}</span></td>
        <td>${d.gender||'—'}</td>
        <td>${d.city}</td>
        <td>${d.contact}</td>
      </tr>`);
      document.getElementById('search-results').innerHTML =
        makeTable(['#','Name','Age','Blood Group','Gender','City','Contact'], rows, 'No donors found.');
    }

    loadAll();
  </script>
</body>
</html>
